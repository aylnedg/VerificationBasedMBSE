name: VerificationBasedMBSE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          echo "=== Checking required files ==="
          test -f VerificationBasedMBSE.prj && echo "PASS: .prj exists" || exit 1
          test -f .gitattributes && echo "PASS: .gitattributes exists" || exit 1
          test -d Requirements && echo "PASS: Requirements/ exists" || exit 1
          test -d Design && echo "PASS: Design/ exists" || exit 1
          test -d Verification && echo "PASS: Verification/ exists" || exit 1
          test -f Verification/QuadcopterTests.mldatx && echo "PASS: test file exists" || exit 1

      - name: Count requirement files
        run: |
          echo "=== Requirement sets ==="
          find Requirements/ -name "*.slreqx" | while read f; do
            echo "FOUND: $f"
          done
          COUNT=$(find Requirements/ -name "*.slreqx" | wc -l)
          echo "Total requirement sets: $COUNT"
          test $COUNT -ge 4 && echo "PASS: minimum requirement sets present" || exit 1

      - name: Count design models
        run: |
          echo "=== Design models ==="
          find Design/ -name "*.slx" | while read f; do
            echo "FOUND: $f"
          done
          COUNT=$(find Design/ -name "*.slx" | wc -l)
          echo "Total design models: $COUNT"
          test $COUNT -ge 4 && echo "PASS: minimum design models present" || exit 1

      - name: Count verification artifacts
        run: |
          echo "=== Verification artifacts ==="
          find Verification/ -name "*.feature" | while read f; do
            echo "FEATURE: $f"
          done
          find Verification/ -name "*.mldatx" | while read f; do
            echo "TESTFILE: $f"
          done
          FEATURES=$(find Verification/ -name "*.feature" | wc -l)
          test $FEATURES -ge 3 && echo "PASS: feature files present" || exit 1

      - name: Check traceability reports exist
        run: |
          echo "=== Reports ==="
          find Verification/reports/ -name "*.html" | while read f; do
            echo "REPORT: $f"
          done
          COUNT=$(find Verification/reports/ -name "*.html" | wc -l)
          test $COUNT -ge 1 && echo "PASS: traceability reports present" || exit 1

      - name: Verify gitattributes covers MathWorks binaries
        run: |
          grep -q "slx" .gitattributes && echo "PASS: .slx covered" || exit 1
          grep -q "slreqx" .gitattributes && echo "PASS: .slreqx covered" || exit 1
          grep -q "mldatx" .gitattributes && echo "PASS: .mldatx covered" || exit 1
          grep -q "mlAutoMerge" .gitattributes && echo "PASS: mlAutoMerge driver present" || exit 1

      - name: Check coverage report exists and is current
        run: |
          echo "=== Coverage gate ==="
          test -f Verification/reports/coverage_FeedbackControl_v3.html \
            && echo "PASS: coverage report present" || exit 1
          SIZE=$(wc -c < Verification/reports/coverage_FeedbackControl_v3.html)
          echo "Coverage report size: $SIZE bytes"
          test $SIZE -gt 50000 \
            && echo "PASS: coverage report has content" || exit 1

          echo "=== Branch role check ==="
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          if [[ $BRANCH == ve/* ]]; then
            echo "VE branch — enforcing coverage gate"
            grep -q "93" \
              Verification/reports/coverage_FeedbackControl_v3.html \
              && echo "PASS: Decision 93% confirmed in report" \
              || (echo "FAIL: coverage below threshold" && exit 1)
          else
            echo "Non-VE branch — coverage gate advisory only"
          fi

      - name: Verify summary report exists
        run: |
          test -f Verification/reports/project_summary_report.html \
            && echo "PASS: summary report present" || exit 1
          SIZE=$(wc -c < Verification/reports/project_summary_report.html)
          echo "Report size: $SIZE bytes"
          test $SIZE -gt 10000 \
            && echo "PASS: report has content" || exit 1

      - name: Upload summary report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: project-summary-report
          path: Verification/reports/project_summary_report.html
          retention-days: 90

      - name: Upload verification reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-reports
          path: Verification/reports/
          retention-days: 30
